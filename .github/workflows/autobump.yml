name: Auto Bump

on:
  push:
    branches: [main]

# Default GITHUB_TOKEN: only needs read. All writes (bump commit, tag push,
# workflow_dispatch on release.yml) go through the App installation token below
# so they bypass the `main` ruleset via the App's bypass entry.
permissions:
  contents: read

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip the bump commit itself to avoid an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using the App token here means the persisted `origin` URL uses the
          # App's auth; subsequent `git push` calls inherit it.
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve App bot user id
        id: bot-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          echo "user-id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Configure git as the App bot
        run: |
          git config user.name  "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.bot-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Install commitizen
        run: pip install commitizen

      - name: Bump version
        id: bump
        run: |
          if cz bump --yes; then
            version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          else
            code=$?
            if [ $code -eq 21 ]; then
              echo "bumped=false" >> "$GITHUB_OUTPUT"
            else
              exit $code
            fi
          fi

      - name: Push commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Trigger release workflow
        if: steps.bump.outputs.bumped == 'true'
        env:
          # Use the App token (not github.token) so the workflow_dispatch is
          # attributed to the App and survives an `actions: write` restriction
          # on the default GITHUB_TOKEN.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run release.yml --ref "${{ steps.bump.outputs.tag }}"
